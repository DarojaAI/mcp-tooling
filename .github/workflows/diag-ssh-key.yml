name: Diagnostic - SSH Key Fingerprint

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fingerprint:
    name: Print SSH_PRIVATE_KEY fingerprint
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Setup SSH key from secret
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/probe_key
          chmod 600 ~/.ssh/probe_key
          echo "=== fingerprint of SSH_PRIVATE_KEY ==="
          ssh-keygen -lf ~/.ssh/probe_key
          echo "=== public key (for visual comparison) ==="
          ssh-keygen -y -f ~/.ssh/probe_key
          rm -f ~/.ssh/probe_key