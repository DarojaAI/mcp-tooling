# =============================================================================
# mcp-tooling - Deploy Duffel MCP server to Hetzner via GitHub Actions
# =============================================================================
# Thin caller that delegates to two shared reusables in infra-actions:
#   - DarojaAI/infra-actions/.github/workflows/reusable-hetzner-terraform-apply.yml
#   - DarojaAI/infra-actions/.github/workflows/reusable-hetzner-deploy.yml
#
# Pattern: "setup" job resolves env vars, then the reusable-calling job
# passes them as inputs. This is required because a job that uses a
# reusable workflow cannot have its own `environment:` key — the env
# must be bound on the setup job so ${{ vars.* }} resolves correctly.
#
# Required secrets (set per GitHub environment):
#   HETZNER_API_TOKEN, HCX_ACCESS_KEY, HCX_SECRET_KEY, SSH_PRIVATE_KEY,
#   DUFFEL_API_KEY, MCPTOOLING_ALLOWED_TOKENS
#   MCPTOOLING_AGENT_<NAME>_TOKEN (one per agent that needs access, e.g.
#     MCPTOOLING_AGENT_TRIP_PLANNING_TOKEN). The install script discovers
#     any env var matching this pattern and appends its value to the
#     allowlist. Forwarded by the deploy job's secrets: block — when you
#     add a new agent, add the secret AND the corresponding line here.
#
# Required environment variables (set per GitHub environment):
#   SERVER_NAME, HETZNER_LOCATION, SERVER_TYPE, HETZNER_SSH_KEY_NAME,
#   HCX_STORAGE_URL
#   MCPTOOLING_AGENT_BINDINGS_JSON (optional, JSON list of {agent, servers[]};
#     when set, the install script warns about token env vars with no
#     matching binding entry — catches typos like TRIP_PLANNING vs
#     trip_planning)
# =============================================================================

name: Deploy Duffel to Hetzner

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        type: environment
      force:
        description: 'Force deploy even if no Terraform changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  setup:
    name: Resolve env config
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      server_name: ${{ steps.resolve.outputs.server_name }}
      server_type: ${{ steps.resolve.outputs.server_type }}
      location: ${{ steps.resolve.outputs.location }}
      hetzner_ssh_key_name: ${{ steps.resolve.outputs.hetzner_ssh_key_name }}
      hcx_storage_url: ${{ steps.resolve.outputs.hcx_storage_url }}
      hcx_region: ${{ steps.resolve.outputs.hcx_region }}
      agent_tokens_configured: ${{ steps.resolve.outputs.agent_tokens_configured }}
    steps:
      - name: Resolve env vars
        id: resolve
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          SERVER_TYPE: ${{ vars.SERVER_TYPE }}
          LOCATION: ${{ vars.HETZNER_LOCATION }}
          HETZNER_SSH_KEY_NAME: ${{ vars.HETZNER_SSH_KEY_NAME }}
          HCX_STORAGE_URL: ${{ vars.HCX_STORAGE_URL }}
          MCPTOOLING_AGENT_BINDINGS_JSON: ${{ vars.MCPTOOLING_AGENT_BINDINGS_JSON }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${SERVER_NAME:-}" ] && missing+=("SERVER_NAME")
          [ -z "${SERVER_TYPE:-}" ] && missing+=("SERVER_TYPE")
          [ -z "${LOCATION:-}" ] && missing+=("HETZNER_LOCATION")
          [ -z "${HETZNER_SSH_KEY_NAME:-}" ] && missing+=("HETZNER_SSH_KEY_NAME")
          [ -z "${HCX_STORAGE_URL:-}" ] && missing+=("HCX_STORAGE_URL")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Environment '${{ inputs.environment }}' is missing required vars:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "server_name=${SERVER_NAME}" >> "$GITHUB_OUTPUT"
          echo "server_type=${SERVER_TYPE}" >> "$GITHUB_OUTPUT"
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"
          echo "hetzner_ssh_key_name=${HETZNER_SSH_KEY_NAME}" >> "$GITHUB_OUTPUT"
          echo "hcx_storage_url=${HCX_STORAGE_URL}" >> "$GITHUB_OUTPUT"
          # Extract region from HCX storage URL (e.g., "hel1" from "https://hel1.your-objectstorage.com/")
          HCX_REGION=$(echo "${HCX_STORAGE_URL}" | sed -E "s|https?://([a-z0-9]+)\..*|\1|")
          [ -z "${HCX_REGION:-}" ] && missing+=("HCX_REGION (could not extract from HCX_STORAGE_URL)")
          echo "hcx_region=${HCX_REGION}" >> "$GITHUB_OUTPUT"
          # Comma-separated list of agent names from MCPTOOLING_AGENT_BINDINGS_JSON.
          # Used by the post_deploy job's `if:` to decide whether to fetch
          # /etc/mcp-tooling/agent-tokens.env. Empty string = no agents configured.
          AGENT_NAMES=""
          if [ -n "${MCPTOOLING_AGENT_BINDINGS_JSON:-}" ] && [ "${MCPTOOLING_AGENT_BINDINGS_JSON}" != "[]" ]; then
            AGENT_NAMES=$(printf '%s' "${MCPTOOLING_AGENT_BINDINGS_JSON}" | python3 -c "
import json,sys
bindings = json.load(sys.stdin)
agents = sorted({b.get('agent') for b in bindings if isinstance(b, dict) and b.get('agent')})
print(','.join(agents))
")
          fi
          echo "agent_tokens_configured=${AGENT_NAMES}" >> "$GITHUB_OUTPUT"

  apply:
    name: "Terraform ${{ inputs.action }}"
    needs: setup
    uses: DarojaAI/infra-actions/.github/workflows/reusable-hetzner-terraform-apply.yml@main
    with:
      action: ${{ inputs.action }}
      environment: ${{ inputs.environment }}
      force: ${{ inputs.force }}
      repo_name: mcp-tooling
      hcx_storage_url: ${{ needs.setup.outputs.hcx_storage_url }}
      hcx_region: ${{ needs.setup.outputs.hcx_region }}
      server_name: ${{ needs.setup.outputs.server_name }}
      server_type: ${{ needs.setup.outputs.server_type }}
      location: ${{ needs.setup.outputs.location }}
      hetzner_ssh_key_name: ${{ needs.setup.outputs.hetzner_ssh_key_name }}
    secrets:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      HCX_ACCESS_KEY: ${{ secrets.HCX_ACCESS_KEY }}
      HCX_SECRET_KEY: ${{ secrets.HCX_SECRET_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  deploy:
    name: Deploy to ${{ needs.setup.outputs.server_name }}
    needs: [setup, apply]
    uses: DarojaAI/infra-actions/.github/workflows/reusable-hetzner-deploy.yml@main
    with:
      server_ip: ${{ needs.apply.outputs.server_ip }}
      server_name: ${{ needs.setup.outputs.server_name }}
      environment: ${{ inputs.environment }}
      remote_path: /opt/mcp-tooling
      install_script: scripts/deploy/install-vm.sh
      health_endpoint: /healthz
      health_port: 8765
      forward_secrets: DUFFEL_API_KEY,MCPTOOLING_ALLOWED_TOKENS,MCPTOOLING_AGENT_BINDINGS_JSON,MCPTOOLING_AGENT_TRIP_PLANNING_TOKEN
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
      MCPTOOLING_ALLOWED_TOKENS: ${{ secrets.MCPTOOLING_ALLOWED_TOKENS }}
      MCPTOOLING_AGENT_BINDINGS_JSON: ${{ vars.MCPTOOLING_AGENT_BINDINGS_JSON }}
      MCPTOOLING_AGENT_TRIP_PLANNING_TOKEN: ${{ secrets.MCPTOOLING_AGENT_TRIP_PLANNING_TOKEN }}

  post_deploy:
    name: Fetch per-agent tokens
    needs: [setup, deploy]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: needs.setup.outputs.agent_tokens_configured != ''
    steps:
      - name: Setup SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Fetch agent-tokens.env from VM
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            "root@${{ needs.apply.outputs.server_ip }}" \
            "cat /etc/mcp-tooling/agent-tokens.env" \
            > agent-tokens.env
          # Sanity check: must be at least one MCPTOOLING_AGENT_*_TOKEN=... line.
          lines=$(grep -cE '^MCPTOOLING_AGENT_[^=[:space:]]+_TOKEN=.+$' agent-tokens.env || true)
          if [ "${lines}" -lt 1 ]; then
            echo "::error::agent-tokens.env has no MCPTOOLING_AGENT_*_TOKEN entries" >&2
            cat agent-tokens.env >&2
            exit 1
          fi
          echo "fetched ${lines} agent token(s):"
          grep -oE '^MCPTOOLING_AGENT_[^=[:space:]]+_TOKEN' agent-tokens.env | sed 's/^/  /'

      - name: Upload agent tokens artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-tokens-${{ inputs.environment }}
          path: agent-tokens.env
          retention-days: 30
