# =============================================================================
# mcp-tooling - Deploy any MCP server to Hetzner via GitHub Actions
# =============================================================================
# Reusable caller that replaces deploy-duffel-hetzner.yml and
# deploy-google-workspace-hetzner.yml. Reads config/servers/<name>.yaml
# for the per-server config and forwards the right secrets to the
# generic install script on the VM.
#
# Required secrets (set per GitHub environment):
#   HETZNER_API_TOKEN, HCX_ACCESS_KEY, HCX_SECRET_KEY, SSH_PRIVATE_KEY,
#   MCPTOOLING_ALLOWED_TOKENS, plus any per-server secrets declared in
#   config/servers/<name>.yaml (e.g. DUFFEL_API_KEY for duffel,
#   GOOGLE_WORKSPACE_* for google-workspace).
#
# Required environment variables (set per GitHub environment):
#   SERVER_NAME, HETZNER_LOCATION, SERVER_TYPE, HETZNER_SSH_KEY_NAME,
#   HCX_STORAGE_URL
#
# Triggered via workflow_dispatch with `server_name` input pointing at
# one of the entries in config/servers/.
# =============================================================================

name: Deploy MCP server to Hetzner

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server name (must match config/servers/<name>.yaml)'
        required: true
        type: string
      action:
        description: 'Deployment action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        type: environment
      force:
        description: 'Force deploy even if no Terraform changes'
        required: false
        default: 'false'
        type: boolean

jobs:
  setup:
    name: Resolve env config
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      server_name: ${{ steps.resolve.outputs.server_name }}
      server_type: ${{ steps.resolve.outputs.server_type }}
      location: ${{ steps.resolve.outputs.location }}
      hetzner_ssh_key_name: ${{ steps.resolve.outputs.hetzner_ssh_key_name }}
      hcx_storage_url: ${{ steps.resolve.outputs.hcx_storage_url }}
      hcx_region: ${{ steps.resolve.outputs.hcx_region }}
      mcp_server_shape: ${{ steps.resolve.outputs.mcp_server_shape }}
      mcp_server_name: ${{ steps.resolve.outputs.mcp_server_name }}
      mcp_server_port: ${{ steps.resolve.outputs.mcp_server_port }}
      mcp_server_url: ${{ steps.resolve.outputs.mcp_server_url }}
      mcp_server_transport: ${{ steps.resolve.outputs.mcp_server_transport }}
      mcp_server_secrets: ${{ steps.resolve.outputs.mcp_server_secrets }}
      mcp_server_optional_secrets: ${{ steps.resolve.outputs.mcp_server_optional_secrets }}
      mcp_server_oauth_scope_guard: ${{ steps.resolve.outputs.mcp_server_oauth_scope_guard }}
      mcp_server_allowed_scopes: ${{ steps.resolve.outputs.mcp_server_allowed_scopes }}
      mcp_server_scope_env_var: ${{ steps.resolve.outputs.mcp_server_scope_env_var }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate server config exists
        run: |
          if [ ! -f "config/servers/${{ inputs.server_name }}.yaml" ]; then
            echo "::error::No config found for server '${{ inputs.server_name }}' at config/servers/${{ inputs.server_name }}.yaml"
            echo "Available servers:"
            ls config/servers/ | sed 's/^/  - /'
            exit 1
          fi

      - name: Resolve env vars + per-server config
        id: resolve
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          SERVER_TYPE: ${{ vars.SERVER_TYPE }}
          LOCATION: ${{ vars.HETZNER_LOCATION }}
          HETZNER_SSH_KEY_NAME: ${{ vars.HETZNER_SSH_KEY_NAME }}
          HCX_STORAGE_URL: ${{ vars.HCX_STORAGE_URL }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${SERVER_NAME:-}" ] && missing+=("SERVER_NAME")
          [ -z "${SERVER_TYPE:-}" ] && missing+=("SERVER_TYPE")
          [ -z "${LOCATION:-}" ] && missing+=("HETZNER_LOCATION")
          [ -z "${HETZNER_SSH_KEY_NAME:-}" ] && missing+=("HETZNER_SSH_KEY_NAME")
          [ -z "${HCX_STORAGE_URL:-}" ] && missing+=("HCX_STORAGE_URL")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Environment '${{ inputs.environment }}' is missing required vars:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "server_name=${SERVER_NAME}" >> "$GITHUB_OUTPUT"
          echo "server_type=${SERVER_TYPE}" >> "$GITHUB_OUTPUT"
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"
          echo "hetzner_ssh_key_name=${HETZNER_SSH_KEY_NAME}" >> "$GITHUB_OUTPUT"
          echo "hcx_storage_url=${HCX_STORAGE_URL}" >> "$GITHUB_OUTPUT"
          HCX_REGION=$(echo "${HCX_STORAGE_URL}" | sed -E "s|https?://([a-z0-9]+)\..*|\1|")
          [ -z "${HCX_REGION:-}" ] && missing+=("HCX_REGION (could not extract from HCX_STORAGE_URL)")
          echo "hcx_region=${HCX_REGION}" >> "$GITHUB_OUTPUT"

          # Parse per-server config.
          python3 - "${{ inputs.server_name }}" > /tmp/mcp_server_config.env <<'PYEOF'
          import sys
          import yaml

          server_name = sys.argv[1]
          with open(f"config/servers/{server_name}.yaml") as f:
              cfg = yaml.safe_load(f) or {}

          # Shape defaults to self_hosted so existing YAML files keep
          # working without modification. Shape 2 (remote_mcp) requires
          # a URL and the install-script-bound fields (port, secrets,
          # package) are ignored.
          shape = cfg.get("shape", "self_hosted")
          if shape not in ("self_hosted", "remote_mcp"):
              print(f"::error::config/servers/{server_name}.yaml: shape must be 'self_hosted' or 'remote_mcp'; got {shape!r}", file=sys.stderr)
              sys.exit(1)

          name = cfg.get("name", server_name)
          url = cfg.get("url")
          transport = cfg.get("transport", "streamable-http")

          # Shape-specific field validation. Self-hosted needs a port
          # (the install script binds to it). Remote_mcp needs a URL.
          # These are mutually exclusive at the deploy-job level —
          # `apply`/`deploy` are skipped for remote_mcp.
          if shape == "self_hosted":
              port = cfg.get("port")
              if port is None:
                  print(f"::error::config/servers/{server_name}.yaml missing 'port' (required for shape=self_hosted)", file=sys.stderr)
                  sys.exit(1)
          else:  # remote_mcp
              if not url:
                  print(f"::error::config/servers/{server_name}.yaml missing 'url' (required for shape=remote_mcp)", file=sys.stderr)
                  sys.exit(1)
              if not (isinstance(url, str) and url.startswith(("http://", "https://"))):
                  print(f"::error::config/servers/{server_name}.yaml: url must be http(s); got {url!r}", file=sys.stderr)
                  sys.exit(1)
              port = None  # explicit: no VM, no port.

          secrets = cfg.get("secrets", [])
          optional = cfg.get("optional_secrets", [])
          oauth_guard = cfg.get("oauth_scope_guard", False)
          allowed_scopes = cfg.get("allowed_scopes", [])

          # Echo the per-server env vars the install script + endpoint
          # manifest need. `port` and `url` are emitted unconditionally;
          # downstream jobs pick the one they need based on shape.
          print(f"mcp_server_shape={shape}")
          print(f"mcp_server_name={name}")
          print(f"mcp_server_port={port if port is not None else ''}")
          print(f"mcp_server_url={url if url is not None else ''}")
          print(f"mcp_server_transport={transport}")
          print(f"mcp_server_secrets={' '.join(secrets)}")
          print(f"mcp_server_optional_secrets={' '.join(optional)}")
          print(f"mcp_server_oauth_scope_guard={'true' if oauth_guard else 'false'}")
          print(f"mcp_server_allowed_scopes={','.join(allowed_scopes)}")

          # If oauth_guard is on, the install script also needs the name
          # of the env var that holds the configured scopes. Convention:
          # any secret in the yaml whose name ends in _SCOPES is the scope var.
          scope_env_vars = sorted(s for s in secrets + optional if s.endswith("_SCOPES"))
          if oauth_guard and scope_env_vars:
              print(f"mcp_server_scope_env_var={scope_env_vars[0]}")
          PYEOF
          cat /tmp/mcp_server_config.env >> "$GITHUB_OUTPUT"

  apply:
    name: "Terraform ${{ inputs.action }}"
    needs: setup
    # Skip the entire VM provisioning chain for Shape 2 (remote_mcp).
    # There's no Hetzner VM to provision; the gateway just points at the
    # vendor's URL.
    if: ${{ needs.setup.outputs.mcp_server_shape != 'remote_mcp' }}
    uses: DarojaAI/infra-actions/.github/workflows/reusable-hetzner-terraform-apply.yml@main
    with:
      action: ${{ inputs.action }}
      environment: ${{ inputs.environment }}
      force: ${{ inputs.force }}
      repo_name: mcp-tooling
      hcx_storage_url: ${{ needs.setup.outputs.hcx_storage_url }}
      hcx_region: ${{ needs.setup.outputs.hcx_region }}
      server_name: ${{ needs.setup.outputs.server_name }}
      server_type: ${{ needs.setup.outputs.server_type }}
      location: ${{ needs.setup.outputs.location }}
      hetzner_ssh_key_name: ${{ needs.setup.outputs.hetzner_ssh_key_name }}
    secrets:
      HETZNER_API_TOKEN: '*** secrets.HETZNER_API_TOKEN }}'
      HCX_ACCESS_KEY: '*** secrets.HCX_ACCESS_KEY }}'
      HCX_SECRET_KEY: '*** secrets.HCX_SECRET_KEY }}'
      SSH_PRIVATE_KEY: '*** secrets.SSH_PRIVATE_KEY }}'

  deploy:
    name: Deploy ${{ needs.setup.outputs.mcp_server_name }} to ${{ needs.setup.outputs.server_name }}
    needs: [setup, apply]
    # Skip the install-on-VM step for Shape 2 (remote_mcp). The vendor
    # owns the server; we just publish its URL downstream.
    if: ${{ needs.setup.outputs.mcp_server_shape != 'remote_mcp' }}
    uses: DarojaAI/infra-actions/.github/workflows/reusable-hetzner-deploy.yml@main
    with:
      server_ip: ${{ needs.apply.outputs.server_ip }}
      server_name: ${{ needs.setup.outputs.server_name }}
      environment: ${{ inputs.environment }}
      remote_path: /opt/mcp-tooling
      install_script: scripts/deploy/install-mcp-server.sh
      health_endpoint: /healthz
      health_port: ${{ needs.setup.outputs.mcp_server_port }}
      # Forward MCP_SERVER_* env vars + per-server secrets.
      # The reusable deploy caller forwards these to the install script.
      forward_env: >-
        MCP_SERVER_NAME=${{ needs.setup.outputs.mcp_server_name }}
        MCP_SERVER_PORT=${{ needs.setup.outputs.mcp_server_port }}
        MCP_SERVER_SECRETS='${{ needs.setup.outputs.mcp_server_secrets }}'
        MCP_SERVER_SCOPE_GUARD=${{ needs.setup.outputs.mcp_server_oauth_scope_guard }}
        MCP_SERVER_ALLOWED_SCOPES=${{ needs.setup.outputs.mcp_server_allowed_scopes }}
        MCP_SERVER_SCOPE_ENV_VAR=${{ needs.setup.outputs.mcp_server_scope_env_var }}
    secrets:
      SSH_PRIVATE_KEY: '*** secrets.SSH_PRIVATE_KEY }}'
      DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
      GOOGLE_WORKSPACE_CLIENT_ID: ${{ secrets.GOOGLE_WORKSPACE_CLIENT_ID }}
      GOOGLE_WORKSPACE_CLIENT_SECRET: '*** secrets.GOOGLE_WORKSPACE_CLIENT_SECRET }}'
      GOOGLE_WORKSPACE_REFRESH_TOKEN: '*** secrets.GOOGLE_WORKSPACE_REFRESH_TOKEN }}'
      AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
      AMADEUS_CLIENT_SECRET: '*** secrets.AMADEUS_CLIENT_SECRET }}'
      MCPTOOLING_ALLOWED_TOKENS: ${{ secrets.MCPTOOLING_ALLOWED_TOKENS }}

  endpoint-manifest:
    name: Publish ${{ needs.setup.outputs.mcp_server_name }} endpoint manifest
    needs: setup
    if: ${{ inputs.action != 'destroy' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup SSH key
        # Only Shape 1 needs SSH — we SCP the manifest from the VM.
        # Shape 2 writes the manifest locally from the YAML inputs.
        if: ${{ needs.setup.outputs.mcp_server_shape != 'remote_mcp' }}
        env:
          SSH_PRIVATE_KEY: '*** secrets.SSH_PRIVATE_KEY }}'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ needs.apply.outputs.server_ip }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fetch endpoint manifest from VM (Shape 1)
        if: ${{ needs.setup.outputs.mcp_server_shape != 'remote_mcp' }}
        env:
          SERVER_IP: ${{ needs.apply.outputs.server_ip }}
          MCP_SERVER_NAME: ${{ needs.setup.outputs.mcp_server_name }}
          ENV_NAME: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          REMOTE="/etc/mcp-tooling/endpoint.json"
          LOCAL="/tmp/endpoint.json"
          if ! scp -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=10 \
                   -i ~/.ssh/id_ed25519 \
                   "root@${SERVER_IP}:${REMOTE}" "${LOCAL}"; then
            echo "::error::Failed to fetch ${REMOTE} from ${SERVER_IP}." >&2
            echo "::error::The install script writes this file after /healthz succeeds; a missing file means the install failed or the script is stale." >&2
            exit 1
          fi
          # Validate it's parseable JSON with the expected shape.
          # Read the expected server name from the env (not the heredoc —
          # quoted heredocs don't expand, and unquoted heredocs would
          # double-substitute GH expressions — GH parses $ + {{ + }} as
          # an expression even inside run: blocks).
          EXPECTED_NAME="${MCP_SERVER_NAME}"
          python3 - "${LOCAL}" "${EXPECTED_NAME}" <<'PYEOF'
          import json, os, sys
          path = sys.argv[1]
          expected = sys.argv[2]
          with open(path) as f:
              data = json.load(f)
          for key in ("name", "port", "ipv4", "mcp_url", "health", "deployed_at"):
              if key not in data:
                  print(f"::error::endpoint.json missing required key '{key}'", file=sys.stderr)
                  sys.exit(1)
          if data["name"] != expected:
              print(f"::error::endpoint.json name is {data['name']!r}, expected {expected!r}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          echo "Manifest for ${MCP_SERVER_NAME} in ${ENV_NAME}:"
          cat "${LOCAL}"

      - name: Render endpoint manifest from YAML (Shape 2)
        # Shape 2 has no VM — render endpoint.json locally from the
        # config/servers/<name>.yaml inputs so the artifact contract
        # is identical to Shape 1 (downstream consumers don't care
        # which shape produced it).
        if: ${{ needs.setup.outputs.mcp_server_shape == 'remote_mcp' }}
        env:
          MCP_SERVER_NAME: ${{ needs.setup.outputs.mcp_server_name }}
          MCP_SERVER_URL: ${{ needs.setup.outputs.mcp_server_url }}
          MCP_SERVER_TRANSPORT: ${{ needs.setup.outputs.mcp_server_transport }}
        run: |
          set -euo pipefail
          LOCAL="/tmp/endpoint.json"
          # Render via Python so the YAML heredoc rules don't conflict
          # with the JSON braces. The output is byte-identical to what
          # the Shape 1 install script writes (modulo absent port/ipv4
          # fields, which the schema documents as optional for Shape 2).
          MCP_SERVER_NAME="${MCP_SERVER_NAME}" \
          MCP_SERVER_URL="${MCP_SERVER_URL}" \
          MCP_SERVER_TRANSPORT="${MCP_SERVER_TRANSPORT}" \
          python3 - <<'PYEOF'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          name = os.environ["MCP_SERVER_NAME"]
          url = os.environ["MCP_SERVER_URL"]
          transport = os.environ["MCP_SERVER_TRANSPORT"]
          deployed_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          payload = {
              "name": name,
              "shape": "remote_mcp",
              "transport": transport,
              "url": url,
              "mcp_url": url,
              "deployed_at": deployed_at,
          }

          with open("/tmp/endpoint.json", "w") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")

          # Validate the payload right where we wrote it — fail fast if
          # any required key is missing. Mirrors the Shape 1 validation
          # block above so the artifact contract is identical.
          for key in ("name", "shape", "mcp_url", "deployed_at"):
              if key not in payload:
                  print(f"::error::endpoint.json missing required key '{key}'", file=sys.stderr)
                  sys.exit(1)
          if payload["name"] != name:
              print(f"::error::endpoint.json name is {payload['name']!r}, expected {name!r}", file=sys.stderr)
              sys.exit(1)
          if payload["shape"] != "remote_mcp":
              print(f"::error::endpoint.json shape is {payload['shape']!r}, expected 'remote_mcp'", file=sys.stderr)
              sys.exit(1)
          PYEOF
          echo "Manifest for ${MCP_SERVER_NAME} (Shape 2):"
          cat "${LOCAL}"

      - name: Upload manifest artifact
        env:
          MCP_SERVER_NAME: ${{ needs.setup.outputs.mcp_server_name }}
          ENV_NAME: ${{ inputs.environment }}
        uses: actions/upload-artifact@v4
        with:
          name: mcp-endpoint-${{ needs.setup.outputs.mcp_server_name }}-${{ inputs.environment }}
          path: /tmp/endpoint.json
          if-no-files-found: error
          retention-days: 90