# Data Access Tier (DAT) Contract for mcp-tooling
# Single source of truth for environment variable names used across
# the deploy pipeline. All scripts MUST read from this file.

# ── deploy_env_vars ──
# Used by GitHub Actions deploy workflow and Terraform.

deploy_env_vars:
  server_name:
    description: "Hetzner server hostname for the duffel MCP server"
    github_var: "SERVER_NAME"
    required: true
    default: "mcp-duffel-dev"

  hetzner_location:
    description: "Hetzner datacenter location (hel1, fsn1, nbg1)"
    github_var: "HETZNER_LOCATION"
    required: true
    default: "hel1"

  server_type:
    description: "Hetzner server type (cx22 = 2 vCPU, 4GB RAM)"
    github_var: "SERVER_TYPE"
    required: true
    default: "cx22"

  hetzner_ssh_key_name:
    description: "SSH key name registered in Hetzner project"
    github_var: "HETZNER_SSH_KEY_NAME"
    required: true

  hcx_storage_url:
    description: "Hetzner Object Storage endpoint URL (e.g., https://hel1.your-objectstorage.com/)"
    github_var: "HCX_STORAGE_URL"
    required: true
  # Note: Terraform state bucket + key are derived inside the infra-actions
  # reusable from `repo_name` and `hcx_storage_url`; no env vars required here.

# ── secrets ──
# GitHub Actions secrets (not environment variables)

secrets:
  hetzner_api_token:
    description: "Hetzner Cloud API token (used by terraform + hcloud-cli)"
    github_secret: "HETZNER_API_TOKEN"
    required: true

  hcx_access_key:
    description: "S3 access key for Terraform state backend"
    github_secret: "HCX_ACCESS_KEY"
    required: true

  hcx_secret_key:
    description: "S3 secret key for Terraform state backend"
    github_secret: "HCX_SECRET_KEY"
    required: true

  ssh_private_key:
    description: "ED25519 private key (no passphrase) for SSH access to the VM"
    github_secret: "SSH_PRIVATE_KEY"
    required: true

  duffel_api_key:
    description: "Duffel API key (sandbox or production)"
    github_secret: "DUFFEL_API_KEY"
    required: true

  mcptooling_allowed_tokens:
    description: "Comma-separated bearer tokens for MCP client allowlist"
    github_secret: "MCPTOOLING_ALLOWED_TOKENS"
    required: true

# ── Google Workspace MCP server (added in google-workspace-mcp PR) ──
# Narrow OAuth surface: drive.file + documents only.
# Scope widening must go through a code change to ALLOWED_SCOPES in
# servers/google_workspace/scope_guard.py, not via runtime config.

  google_workspace_client_id:
    description: "Google OAuth client ID (apps.googleusercontent.com)"
    github_secret: "GOOGLE_WORKSPACE_CLIENT_ID"
    required: true

  google_workspace_client_secret:
    description: "Google OAuth client secret"
    github_secret: "GOOGLE_WORKSPACE_CLIENT_SECRET"
    required: true

  google_workspace_refresh_token:
    description: |
      Google OAuth refresh token (one-time bootstrap; rotated via the
      OAuth bootstrap procedure in docs/integrations/google-workspace-mcp.md).
    github_secret: "GOOGLE_WORKSPACE_REFRESH_TOKEN"
    required: true

  google_workspace_scopes:
    description: |
      Optional override for OAuth scopes. If unset, the server uses the
      narrow allowlist (drive.file + documents). If set, every scope MUST
      be in servers/google_workspace/scope_guard.ALLOWED_SCOPES — the
      server refuses to start otherwise. Required to be bound to mcp_tooling
      agent only; scope expansion requires explicit PR-level review.
    github_secret: "GOOGLE_WORKSPACE_SCOPES"
    required: false

# ── Amadeus Hotels MCP server (added in amadeus-hotels PR) ──
# Search-only: 4 tools, no booking. Uses OAuth2 client credentials
# (different from google-workspace's refresh token + duffel's API key);
# ServerSpec handles all three uniformly.

  amadeus_client_id:
    description: "Amadeus Self-Service OAuth client ID (from developers.amadeus.com)"
    github_secret: "AMADEUS_CLIENT_ID"
    required: true

  amadeus_client_secret:
    description: "Amadeus Self-Service OAuth client secret"
    github_secret: "AMADEUS_CLIENT_SECRET"
    required: true

  amadeus_env:
    description: "Amadeus environment: 'test' (default) or 'production'"
    github_secret: "AMADEUS_ENV"
    required: false
