name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      
      - name: Lint with ruff
        run: ruff check .
      
      - name: Type check with mypy
        run: mypy runtime/ servers/ || true  # Non-blocking until code exists
      
      - name: Run tests
        run: pytest tests/ --cov=runtime --cov=servers --cov-report=term-missing
      
      - name: Validate workflow contract
        run: python3 scripts/ci/validate-workflow-contract.py
      
      - name: Check for plaintext secrets (example files)
        run: |
          if ls servers/*/config.example.env 1>/dev/null 2>&1; then
            python3 scripts/ci/check-no-plaintext-secrets.py servers/*/config.example.env
          else
            echo "No config.example.env files to check yet"
          fi
