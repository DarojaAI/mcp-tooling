name: Sync Environment Options

on:
  workflow_dispatch:
  schedule:
    # Run daily at 3 AM UTC to catch environment changes
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    uses: DarojaAI/infra-actions/.github/workflows/reusable-sync-environment-options.yml@v1.19.12
    with:
      workflow-files: |
        .github/workflows/deploy-duffel-hetzner.yml
      input-name: environment
      default-env: dev
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
