# =============================================================================
# mcp-tooling - Update config/endpoints.yaml from a deploy artifact
# =============================================================================
# Companion to deploy-mcp-server.yml's endpoint-manifest job (PR #49).
# Reads the per-deploy endpoint JSON artifact and merges it into
# config/endpoints.yaml, opening a PR with the result.
#
# Trigger: workflow_dispatch. Operators run this manually after a
# successful deploy to update the in-repo registry. We deliberately
# avoid `workflow_run` here because:
#
#   1. Cross-workflow artifact access from `workflow_run` triggers
#      requires `actions: read` on both the triggering and triggered
#      workflows. Adding that to deploy-mcp-server.yml would couple
#      PRs #49 and #50 for no real benefit.
#   2. A manual dispatch is more visible — humans see when the registry
#      updates, and the deploy run summary can include a "next: run
#      update-endpoints with run URL X" hint.
#   3. The PR that lands on main is the visible signal; humans review
#      the YAML diff before merge.
#
# Inputs:
#   - deploy_run_url: paste-the-URL from the deploy-mcp-server.yml run.
#     The workflow parses the run ID out of it, lists the run's
#     artifacts, downloads the mcp-endpoint-* one, and derives
#     (server, env) from the artifact name + JSON body. Operators
#     don't type server name or environment by hand — the artifact
#     is the source of truth.
# =============================================================================

name: Update endpoints registry

on:
  workflow_dispatch:
    inputs:
      deploy_run_url:
        description: "URL of the deploy-mcp-server.yml run (paste from the Actions UI)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  update:
    name: Update endpoints registry
    runs-on: ubuntu-latest
    steps:
      - name: Validate + parse run URL
        id: parse
        env:
          INPUT_URL: ${{ inputs.deploy_run_url }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          # Accept either a full GitHub Actions run URL or just the run ID.
          # Examples that must work:
          #   https://github.com/DarojaAI/mcp-tooling/actions/runs/12345
          #   /DarojaAI/mcp-tooling/actions/runs/12345
          #   12345
          url="${INPUT_URL}"
          if [[ "${url}" =~ ^[0-9]+$ ]]; then
            # Just a numeric run id.
            run_id="${url}"
            run_url="${SERVER_URL}/${REPO}/actions/runs/${run_id}"
          elif [[ "${url}" =~ /actions/runs/([0-9]+) ]]; then
            run_id="${BASH_REMATCH[1]}"
            if [[ "${url}" =~ ^https?:// ]]; then
              run_url="${url}"
            else
              run_url="${SERVER_URL}${url}"
            fi
          else
            echo "::error::deploy_run_url must be either a numeric run ID or a URL containing '/actions/runs/<id>'." >&2
            echo "::error::Got: ${url}" >&2
            exit 1
          fi
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "run_url=${run_url}" >> "$GITHUB_OUTPUT"
          echo "Parsed run_id=${run_id} run_url=${run_url}"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Download endpoint artifact
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.parse.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # List the run's artifacts first; pick the one whose name starts
          # with 'mcp-endpoint-'. This avoids asking the operator to type
          # the server name and environment — we discover both from the
          # artifact name + JSON body.
          echo "Listing artifacts for ${REPO} run ${RUN_ID}"
          artifact_json="$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts")"
          artifact_name="$(echo "${artifact_json}" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          names = [a['name'] for a in data.get('artifacts', []) if a['name'].startswith('mcp-endpoint-')]
          if not names:
              print('NONE', file=sys.stderr)
              sys.exit(1)
          print(names[0])
          ")"
          if [ -z "${artifact_name}" ] || [ "${artifact_name}" = "NONE" ]; then
            echo "::error::No mcp-endpoint-* artifact found on run ${RUN_ID}." >&2
            echo "::error::Check that the deploy-mcp-server.yml run completed successfully and the artifact hasn't expired." >&2
            exit 1
          fi
          echo "Found artifact: ${artifact_name}"
          if ! gh run download "${RUN_ID}" \
              --repo "${REPO}" \
              --name "${artifact_name}" \
              --dir /tmp/endpoint-artifact; then
            echo "::error::Failed to download artifact ${artifact_name} from run ${RUN_ID}." >&2
            exit 1
          fi
          ls -la /tmp/endpoint-artifact
          echo "artifact_path=/tmp/endpoint-artifact/endpoint.json" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Merge into config/endpoints.yaml
        env:
          ARTIFACT_PATH: ${{ steps.download.outputs.artifact_path }}
          ARTIFACT_NAME: ${{ steps.download.outputs.artifact_name }}
          RUN_URL: ${{ steps.parse.outputs.run_url }}
        run: |
          set -euo pipefail
          # Derive (server, env) from the artifact name (mcp-endpoint-<server>-<env>)
          # and validate them against the artifact body so we never trust operator
          # input — the artifact is the source of truth.
          python3 - <<PYEOF
          import json
          import re
          import sys
          from pathlib import Path
          sys.path.insert(0, "scripts/ci")
          import endpoint_registry as reg

          artifact = json.loads(Path("${ARTIFACT_PATH}").read_text())
          for key in ("name", "port", "ipv4", "mcp_url", "health"):
              if key not in artifact:
                  print(f"::error::artifact missing key {key!r}", file=sys.stderr)
                  sys.exit(1)

          # Artifact name shape: mcp-endpoint-<server>-<env>
          m = re.match(r"^mcp-endpoint-([a-zA-Z0-9][a-zA-Z0-9_-]{0,63})-([a-zA-Z0-9][a-zA-Z0-9_-]{0,63})$",
                       "${ARTIFACT_NAME}")
          if not m:
              print(f"::error::artifact name ${ARTIFACT_NAME!r} doesn't match mcp-endpoint-<server>-<env>", file=sys.stderr)
              sys.exit(1)
          name_from_artifact, env_from_artifact = m.group(1), m.group(2)

          if artifact["name"] != name_from_artifact:
              print(
                  f"::error::artifact body name={artifact['name']!r} != artifact-name server={name_from_artifact!r}",
                  file=sys.stderr,
              )
              sys.exit(1)

          data = reg.load("config/endpoints.yaml")
          data = reg.update(
              data,
              server=artifact["name"],
              env=env_from_artifact,
              mcp_url=artifact["mcp_url"],
              health=artifact["health"],
              last_run="${RUN_URL}",
          )
          reg.write("config/endpoints.yaml", data)
          print(f"Updated config/endpoints.yaml for {name_from_artifact}/{env_from_artifact}")
          PYEOF
          echo "--- updated config/endpoints.yaml ---"
          cat config/endpoints.yaml

      - name: Detect if anything changed
        id: changed
        run: |
          set -euo pipefail
          if git diff --quiet -- config/endpoints.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to config/endpoints.yaml."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat -- config/endpoints.yaml
            git diff -- config/endpoints.yaml
          fi

      - name: Open PR with updated registry
        if: steps.changed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ steps.download.outputs.artifact_name }}
          RUN_URL: ${{ steps.parse.outputs.run_url }}
        run: |
          set -euo pipefail
          # Derive server+env from the artifact name again so we don't
          # depend on operator-provided values for the PR title.
          if [[ "${ARTIFACT_NAME}" =~ ^mcp-endpoint-([a-zA-Z0-9][a-zA-Z0-9_-]{0,63})-([a-zA-Z0-9][a-zA-Z0-9_-]{0,63})$ ]]; then
              SERVER="${BASH_REMATCH[1]}"
              ENV_NAME="${BASH_REMATCH[2]}"
          else
              echo "::error::artifact name ${ARTIFACT_NAME} doesn't match expected shape" >&2
              exit 1
          fi
          timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          branch="endpoints/${SERVER}-${ENV_NAME}-${timestamp}"
          git checkout -b "${branch}"
          git add config/endpoints.yaml
          git -c user.name="mcp-tooling-bot" \
              -c user.email="bot@mcp-tooling.local" \
              commit -m "endpoints: update ${SERVER}/${ENV_NAME} from ${RUN_URL}"

          git push -u origin "${branch}"

          diff_text="$(git diff --stat HEAD~1 HEAD -- config/endpoints.yaml)"
          body="$(cat <<BODY
          Auto-generated by the update-endpoints workflow.

          **Server:** \`${SERVER}\`
          **Environment:** \`${ENV_NAME}\`
          **Source deploy run:** ${RUN_URL}
          **Updated at:** ${timestamp}

          ## Diff

          \`\`\`
          ${diff_text}
          \`\`\`

          ---
          *This PR will auto-merge once checks pass.*
          BODY
          )"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "endpoints: ${SERVER} / ${ENV_NAME} — ${timestamp}" \
            --body "${body}"
          echo "Opened PR for ${branch}"