name: Deploy Duffel to Hetzner

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (plan/apply/destroy)'
        required: true
        default: 'plan'

# This is a Phase 4 placeholder workflow to satisfy contract validation.
# Full implementation coming in Phase 4.

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
