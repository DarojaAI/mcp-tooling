name: Diagnostic - SSH Key Contents

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contents:
    name: Inspect SSH_PRIVATE_KEY as written by deploy reusable
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Reproduce deploy's key write
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/repro_key
          chmod 600 ~/.ssh/repro_key
          echo "=== file size ==="
          wc -c ~/.ssh/repro_key
          echo "=== file lines ==="
          wc -l ~/.ssh/repro_key
          echo "=== first 3 lines (literal) ==="
          head -3 ~/.ssh/repro_key | cat -A
          echo "=== fingerprint ==="
          ssh-keygen -lf ~/.ssh/repro_key 2>&1 || echo "(fingerprint parse failed)"
          echo "=== try ssh-keygen parse as openssh ==="
          ssh-keygen -y -f ~/.ssh/repro_key 2>&1 | head -3